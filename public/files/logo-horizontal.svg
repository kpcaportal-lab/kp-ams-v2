  <rect x="5" y="5" width="70" height="70" rx="6" fill="#1E3A5F" stroke="#D4A574" stroke-width="2"/>
  <text x="40" y="60" text-anchor="middle" fill="#D4A574" font-family="serif" font-size="48" font-weight="bold">K&P</text>
  
  <!-- Text group -->
  <g>
    <!-- Main text -->
    <text x="90" y="35" fill="#1E3A5F" font-family="Georgia, serif" font-size="28" font-weight="bold">KIRTANE</text>
    <text x="245" y="35" fill="#D4A574" font-family="Georgia, serif" font-size="14" font-style="italic">&amp;</text>
    <text x="90" y="62" fill="#1E3A5F" font-family="Georgia, serif" font-size="24" font-weight="bold">PANDIT</text>
    
