<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Shield emblem -->
  <path d="M30 10 L60 10 L60 55 Q45 75 30 55 Z" fill="#1E3A5F" stroke="#D4A574" stroke-width="1.5"/>
  <path d="M37 22 L53 22 L53 48 Q45 60 37 48 Z" fill="none" stroke="#D4A574" stroke-width="1"/>
  <!-- K & P monogram inside shield -->
  <text x="45" y="44" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#D4A574" text-anchor="middle">KP</text>
  <!-- Firm name -->
  <text x="80" y="38" font-family="Georgia, 'Playfair Display', serif" font-size="30" font-weight="700" fill="#1E3A5F" letter-spacing="1">KIRTANE</text>
  <text x="265" y="38" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#D4A574" letter-spacing="1">&amp;</text>
  <text x="290" y="38" font-family="Georgia, 'Playfair Display', serif" font-size="30" font-weight="700" fill="#1E3A5F" letter-spacing="1">PANDIT</text>
  <!-- Gold divider line -->
  <line x1="80" y1="50" x2="390" y2="50" stroke="#D4A574" stroke-width="1.5"/>
  <!-- Subtitle -->
  <text x="80" y="70" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4A7BA7" letter-spacing="4" text-transform="uppercase">CHARTERED ACCOUNTANTS</text>
  <!-- Tagline -->
  <text x="80" y="90" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#666666" letter-spacing="2">INTEGRITY • EXCELLENCE • INNOVATION</text>
</svg>
